<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RE.cipe — Auth</title>
  <meta name="description" content="Login or create your RE.cipe account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">[RE.cipe]</a>
    <div class="nav-links">
      <a href="index.html#demo">demo</a>
      <a href="index.html#features">features</a>
      <a href="index.html#themes">themes</a>
      <a href="index.html#how">workflow</a>
    </div>
    <div class="nav-actions">
      <a href="auth.html" class="btn btn-ghost">&gt; login</a>
      <a href="auth.html#register" class="btn btn-primary">&gt; sign_up</a>
    </div>
  </nav>

  <!-- AUTH TERMINAL -->
  <main class="auth-main">

    <!-- eyebrow -->
    <p class="eyebrow">// access your workspace</p>

    <!-- CSS-only tab switcher via hidden radio inputs -->
    <div class="auth-wrap">
      <input type="radio" name="auth-tab" id="tab-login"    class="auth-radio" checked />
      <input type="radio" name="auth-tab" id="tab-register" class="auth-radio" />

      <div class="terminal auth-terminal">

        <!-- Terminal bar -->
        <div class="term-bar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="term-title">re.cipe — auth<span class="term-cursor"></span></span>
        </div>

        <!-- Tab header -->
        <div class="auth-tabs">
          <label for="tab-login"    class="auth-tab">$ login()</label>
          <label for="tab-register" class="auth-tab">$ register()</label>
        </div>

        <!-- ── LOGIN PANEL ── -->
        <div class="auth-panel login-panel">
          <div class="term-body auth-body">
            <p class="t-dim auth-comment">// enter your credentials</p>

            <form class="auth-form" action="#" method="post" novalidate>

              <div class="form-group">
                <label class="form-label" for="login-email"><span class="t-acc">&gt;</span> email</label>
                <input
                  type="email"
                  id="login-email"
                  name="email"
                  class="form-input"
                  placeholder="your@email.com"
                  autocomplete="email"
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="login-password"><span class="t-acc">&gt;</span> password</label>
                <input
                  type="password"
                  id="login-password"
                  name="password"
                  class="form-input"
                  placeholder="••••••••"
                  autocomplete="current-password"
                />
              </div>

              <button type="submit" class="btn btn-primary auth-btn">&gt; login --now</button>

            </form>

            <p class="auth-switch">
              no account yet?
              <label for="tab-register" class="auth-switch-link">register()</label>
            </p>
          </div>
        </div>

        <!-- ── REGISTER PANEL ── -->
        <div class="auth-panel register-panel">
          <div class="term-body auth-body">
            <p class="t-dim auth-comment">// create your account</p>

            <form class="auth-form" action="#" method="post" novalidate>

              <div class="form-group">
                <label class="form-label" for="reg-username"><span class="t-acc">&gt;</span> username</label>
                <input
                  type="text"
                  id="reg-username"
                  name="username"
                  class="form-input"
                  placeholder="chef_42"
                  autocomplete="username"
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="reg-email"><span class="t-acc">&gt;</span> email</label>
                <input
                  type="email"
                  id="reg-email"
                  name="email"
                  class="form-input"
                  placeholder="your@email.com"
                  autocomplete="email"
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="reg-password"><span class="t-acc">&gt;</span> password</label>
                <input
                  type="password"
                  id="reg-password"
                  name="password"
                  class="form-input"
                  placeholder="••••••••"
                  autocomplete="new-password"
                />
              </div>

              <div class="form-group">
                <label class="form-label" for="reg-confirm"><span class="t-acc">&gt;</span> confirm_password</label>
                <input
                  type="password"
                  id="reg-confirm"
                  name="confirm"
                  class="form-input"
                  placeholder="••••••••"
                  autocomplete="new-password"
                />
              </div>

              <button type="submit" class="btn btn-primary auth-btn">&gt; create_account()</button>

            </form>

            <p class="auth-switch">
              already have an account?
              <label for="tab-login" class="auth-switch-link">login()</label>
            </p>
          </div>
        </div>

        <!-- Terminal status bar -->
        <div class="term-status">
          <span class="status-dot"></span>
          <span class="auth-status-login">READY — awaiting credentials</span>
          <span class="auth-status-register">READY — new user setup</span>
          <span style="margin-left:auto">v0.1</span>
        </div>

      </div><!-- /.terminal -->
    </div><!-- /.auth-wrap -->

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <a href="index.html" class="logo">[RE.cipe]</a>
    <span class="muted">v0.1</span>
  </footer>

  <script>
    // Switch to register tab when #register hash is present
    function applyHash() {
      if (window.location.hash === '#register') {
        document.getElementById('tab-register').checked = true;
      } else {
        document.getElementById('tab-login').checked = true;
      }
    }
    applyHash();
    window.addEventListener('hashchange', applyHash);
  </script>
</body>
</html>
